<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latte arts by Yana✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Courier+Prime&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="coffee-stain stain-1" id="stain1"></div>
    <div class="coffee-stain stain-2" id="stain2"></div>
    <div class="bg-particles" id="particles"></div>

    <div class="audio-control" onclick="toggleMusic()">
        <span id="music-icon">🎵</span>
        <audio id="bg-music" loop>
            <source src="musicvof.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="filter-container">
        <select id="monthFilter" onchange="applyFilter()">
            <option value="all">All arts</option>
        </select>
    </div>

    <h1>Latte arts by Yana ✨</h1>
    <div class="subtitle">Made with love დ</div>

    <div class="slider-wrapper">
        <button class="nav-btn prev" onclick="move(-1)">❮</button>
        <button class="nav-btn next" onclick="move(1)">❯</button>

        <div class="slider-container" id="slider">
            <div class="coffee-card" data-date="2025-12"><div class="polaroid-wrap" style="--r:3deg" onclick="handleCardClick(event,this)"><div class="polaroid-front"><img src="IMG_20251217_142151.jpg" onclick="openLightbox(this.closest('.polaroid-wrap')); event.stopPropagation();"><div class="date-text">17.12.2025</div></div><div class="polaroid-back"><div class="back-note">TEST</div></div></div></div>
            <div class="coffee-card" data-date="2026-01"><div class="polaroid-wrap" style="--r:-2deg" onclick="handleCardClick(this)"><div class="polaroid-front"><img src="IMG_20260106_115427.jpg"><div class="date-text">06.01.2026</div></div><div class="polaroid-back"><div class="back-note">TEST</div></div></div></div>
            <div class="coffee-card" data-date="2026-01"><div class="polaroid-wrap" style="--r:1deg" onclick="handleCardClick(this)"><div class="polaroid-front"><img src="IMG_20260115_115318.jpg"><div class="date-text">15.01.2026</div></div><div class="polaroid-back"><div class="back-note">TEST</div></div></div></div>
            <div class="coffee-card" data-date="2026-01"><div class="polaroid-wrap" style="--r:-3deg" onclick="handleCardClick(this)"><div class="polaroid-front"><img src="IMG_20260119_103301.jpg"><div class="date-text">19.01.2026</div></div><div class="polaroid-back"><div class="back-note">TEST</div></div></div></div>
            <div class="coffee-card" data-date="2026-01"><div class="polaroid-wrap" style="--r:2deg" onclick="handleCardClick(this)"><div class="polaroid-front"><img src="IMG_20260120_124125.jpg"><div class="date-text">20.01.2026</div></div><div class="polaroid-back"><div class="back-note">TEST</div></div></div></div>
            <div class="coffee-card" data-date="2026-01"><div class="polaroid-wrap" style="--r:-1deg" onclick="handleCardClick(this)"><div class="polaroid-front"><img src="IMG_20260129_144001.jpg"><div class="date-text">29.01.2026</div></div><div class="polaroid-back"><div class="back-note">TEST</div></div></div></div>
            <div class="coffee-card" data-date="2026-01"><div class="polaroid-wrap" style="--r:4deg" onclick="handleCardClick(this)"><div class="polaroid-front"><img src="IMG_20260129_154607.jpg"><div class="date-text">29.01.2026</div></div><div class="polaroid-back"><div class="back-note">TEST</div></div></div></div>
            <div class="coffee-card" data-date="2026-02"><div class="polaroid-wrap" style="--r:-2deg" onclick="handleCardClick(this)"><div class="polaroid-front"><img src="IMG_20260216_133451.jpg"><div class="date-text">16.02.2026</div></div><div class="polaroid-back"><div class="back-note">TEST</div></div></div></div>
            <div class="coffee-card" data-date="2026-03"><div class="polaroid-wrap" style="--r:1deg" onclick="handleCardClick(this)"><div class="polaroid-front"><img src="IMG_20260302_115217.jpg"><div class="date-text">02.03.2026</div></div><div class="polaroid-back"><div class="back-note">TEST</div></div></div></div>
            <div class="coffee-card" data-date="2026-03"><div class="polaroid-wrap" style="--r:-2deg" onclick="handleCardClick(this)"><div class="polaroid-front"><img src="IMG_20260305_105547.jpg"><div class="date-text">05.03.2026</div></div><div class="polaroid-back"><div class="back-note">TEST</div></div></div></div>
            <div class="coffee-card" data-date="unknown"><div class="polaroid-wrap" style="--r:1deg" onclick="handleCardClick(this)"><div class="polaroid-front"><img src="photo1.jpg"><div class="date-text">xx.xx.xxxx</div></div><div class="polaroid-back"><div class="back-note">TEST</div></div></div></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="counter"><span id="current">1</span> / <span id="total">0</span></div>
        <div class="dots" id="dots"></div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <div class="lightbox-inner">
            <div class="lightbox-polaroid">
                <img id="lb-img" src="" alt="">
                <div class="lightbox-date" id="lb-date"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
